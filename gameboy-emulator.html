<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게임보이 에뮬레이터</title>
<style>
  :root {
    --primary: #007AFF; --success: #34C759; --warning: #FF9F0A; --danger: #FF3B30;
    --bg: #F2F2F7; --card: #FFFFFF; --text-main: #1C1C1E; --text-sub: #8E8E93; --border: #E5E5EA;
    --bg-blur: rgba(242,242,247,0.82);
    --shell-light: #d8d3c8; --shell: #c7c2b5; --shell-dark: #9a9486;
    --shell-shadow: #79746a;
    --screen-bezel: #2b2b33; --screen-tint: #8fae0f; --screen-tint-dark: #33430a;
    --accent-purple: #6b2d8c; --accent-purple-dark: #4a1d63;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text-main); display: flex; justify-content: center;
    -webkit-tap-highlight-color: transparent; letter-spacing: -0.01em; overscroll-behavior: none;
  }
  #app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); position: relative;
    display: flex; flex-direction: column; overflow-x: hidden; }

  .nav-bar { position: sticky; top: 0; width: 100%; height: 54px; background: var(--bg-blur);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    display: flex; justify-content: space-between; align-items: center; padding: 0 14px;
    box-sizing: border-box; z-index: 100; border-bottom: 0.5px solid var(--border); flex: none; }
  .nav-btn { background: none; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    padding: 6px 8px; color: var(--primary); display: inline-flex; align-items: center; gap: 4px; }
  .nav-title { font-size: 17px; font-weight: 700; }
  .nav-spacer { width: 60px; }

  .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 18px 16px 40px; }

  /* ---------- 선택 전 : 파일 첨부 화면 ---------- */
  #picker-view { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
  .gb-logo-badge { width: 84px; height: 84px; border-radius: 22px; background: linear-gradient(160deg, var(--accent-purple), var(--accent-purple-dark));
    display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 6px 16px rgba(107,45,140,0.35); margin-bottom: 18px; }
  .picker-title { font-size: 21px; font-weight: 900; margin-bottom: 6px; text-align: center; }
  .picker-sub { font-size: 13px; color: var(--text-sub); font-weight: 600; text-align: center; line-height: 1.5; margin-bottom: 26px; }
  .attach-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: white;
    font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .attach-btn:active { opacity: 0.85; }
  .attach-hint { margin-top: 12px; font-size: 11.5px; color: var(--text-sub); font-weight: 600; text-align: center; line-height: 1.6; }
  .attach-hint b { color: var(--text-main); }
  #rom-input { display: none; }

  /* ---------- 플레이 화면 : GameBoy 쉘 ---------- */
  #player-view { width: 100%; display: none; flex-direction: column; align-items: center; }
  .gb-shell {
    width: 100%; max-width: 340px; border-radius: 22px 22px 60px 22px;
    background: linear-gradient(160deg, var(--shell-light), var(--shell) 55%, var(--shell-dark));
    padding: 18px 18px 26px; box-shadow: 0 10px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
    position: relative;
  }
  .gb-brand { text-align: right; font-size: 11px; font-weight: 800; font-style: italic; color: var(--accent-purple-dark);
    letter-spacing: 0.02em; margin-bottom: 6px; padding-right: 4px; }
  .gb-screen-bezel { background: var(--screen-bezel); border-radius: 10px; padding: 14px 12px 10px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.6); }
  .gb-screen-topline { display: flex; justify-content: space-between; align-items: center; padding: 0 2px 8px; }
  .gb-screen-topline .battery { display:flex; align-items:center; gap:5px; font-size:9px; color:#8fae0f; font-weight:700; letter-spacing:0.05em; }
  .battery-dot { width:6px; height:6px; border-radius:50%; background:#ff3b30; box-shadow:0 0 4px #ff3b30; }
  .battery-dot.on { background:#8fae0f; box-shadow:0 0 4px #8fae0f; }
  .gb-canvas-wrap { background: var(--screen-tint); border-radius: 2px; display: flex; align-items: center; justify-content: center;
    padding: 4px; overflow: hidden; }
  #gbCanvas { width: 100%; max-width: 288px; height: auto; aspect-ratio: 160 / 144; image-rendering: pixelated;
    image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; background: var(--screen-tint-dark); display: block; }
  .gb-screen-label { text-align: center; font-size: 10px; color: #9a9486; font-weight: 700; letter-spacing: 0.15em; margin-top: 8px; }

  .gb-controls-row { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; padding: 0 6px; }
  .dpad { position: relative; width: 96px; height: 96px; }
  .dpad-btn { position: absolute; background: linear-gradient(180deg,#3a3a3e,#1c1c1e); border: none; touch-action: none; }
  .dpad-btn:active { background: linear-gradient(180deg,#4a4a4e,#2c2c2e); }
  .dpad-v { left: 32px; top: 0; width: 32px; height: 96px; border-radius: 6px; }
  .dpad-h { left: 0; top: 32px; width: 96px; height: 32px; border-radius: 6px; }
  .dpad-up { position:absolute; left:32px; top:0; width:32px; height:32px; }
  .dpad-down { position:absolute; left:32px; top:64px; width:32px; height:32px; }
  .dpad-left { position:absolute; left:0; top:32px; width:32px; height:32px; }
  .dpad-right { position:absolute; left:64px; top:32px; width:32px; height:32px; }

  .ab-group { display: flex; gap: 14px; align-items: center; transform: rotate(-18deg); margin-right: 4px; }
  .round-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: linear-gradient(160deg, var(--accent-purple), var(--accent-purple-dark));
    color: white; font-weight: 800; font-size: 15px; box-shadow: 0 3px 0 var(--accent-purple-dark), 0 4px 8px rgba(0,0,0,0.25); touch-action: none; }
  .round-btn:active { box-shadow: 0 1px 0 var(--accent-purple-dark); transform: translateY(2px); }

  .gb-startselect-row { display: flex; justify-content: center; gap: 22px; margin-top: 22px; }
  .pill-btn { width: 52px; height: 16px; border-radius: 8px; border: none; background: var(--shell-shadow);
    box-shadow: 0 2px 0 rgba(0,0,0,0.15); touch-action: none; }
  .pill-btn:active { background: #6a6558; }
  .pill-label { display:block; text-align:center; font-size: 9px; color: var(--shell-shadow); font-weight:700; margin-top:4px; letter-spacing:0.1em; }

  .gb-speaker { position: absolute; right: 22px; bottom: 18px; display: grid; grid-template-columns: repeat(3, 6px); gap: 4px; transform: rotate(-18deg); }
  .gb-speaker span { width: 6px; height: 6px; border-radius: 50%; background: var(--shell-shadow); opacity: 0.6; }

  .action-row { width: 100%; max-width: 340px; display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .util-btn { flex: 1; min-width: 100px; padding: 13px 8px; border-radius: 12px; border: none; background: var(--card);
    color: var(--text-main); font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center; gap: 6px; }
  .util-btn.danger { color: var(--danger); }
  .util-btn:active { opacity: 0.8; }

  .rom-name-tag { margin-top: 14px; font-size: 12px; color: var(--text-sub); font-weight: 600; text-align: center; }
  .rom-name-tag b { color: var(--text-main); }

  .kbd-hint { width: 100%; max-width: 340px; margin-top: 18px; font-size: 11px; color: var(--text-sub); font-weight: 600;
    text-align: center; line-height: 1.7; background: var(--card); border-radius: 10px; padding: 10px; }
</style>
</head>
<body>
<div id="app">
  <nav class="nav-bar">
    <button class="nav-btn" id="btn-exit">‹ 나가기</button>
    <div class="nav-title">🎮 게임보이 에뮬레이터</div>
    <div class="nav-spacer"></div>
  </nav>

  <div class="content">
    <!-- 파일 첨부 화면 -->
    <div id="picker-view">
      <div class="gb-logo-badge">👾</div>
      <div class="picker-title">게임보이 에뮬레이터</div>
      <div class="picker-sub">.gb 또는 .gbc 롬 파일을 첨부하면<br>바로 이 자리에서 게임을 플레이할 수 있어요.</div>
      <button class="attach-btn" id="btn-attach">📁 롬 파일 첨부하기</button>
      <input type="file" id="rom-input" />
      <div class="attach-hint">지원 형식: <b>.gb / .gbc</b><br>파일은 이 기기(브라우저) 안에서만 실행되며 서버로 전송되지 않아요.</div>
    </div>

    <!-- 플레이 화면 -->
    <div id="player-view">
      <div class="gb-shell">
        <div class="gb-brand">Nintendo GameBoy</div>
        <div class="gb-screen-bezel">
          <div class="gb-screen-topline">
            <span class="battery"><span class="battery-dot" id="battery-dot"></span>BATTERY</span>
            <span class="battery">DOT MATRIX</span>
          </div>
          <div class="gb-canvas-wrap">
            <canvas id="gbCanvas" width="160" height="144"></canvas>
          </div>
          <div class="gb-screen-label">게임보이 온라인</div>
        </div>

        <div class="gb-controls-row">
          <div class="dpad">
            <div class="dpad-v"></div>
            <div class="dpad-h"></div>
            <button class="dpad-btn dpad-up" data-key="up" aria-label="위"></button>
            <button class="dpad-btn dpad-down" data-key="down" aria-label="아래"></button>
            <button class="dpad-btn dpad-left" data-key="left" aria-label="왼쪽"></button>
            <button class="dpad-btn dpad-right" data-key="right" aria-label="오른쪽"></button>
          </div>
          <div class="ab-group">
            <button class="round-btn" data-key="b" aria-label="B">B</button>
            <button class="round-btn" data-key="a" aria-label="A">A</button>
          </div>
        </div>

        <div class="gb-startselect-row">
          <div>
            <button class="pill-btn" data-key="select" aria-label="셀렉트"></button>
            <span class="pill-label">SELECT</span>
          </div>
          <div>
            <button class="pill-btn" data-key="start" aria-label="스타트"></button>
            <span class="pill-label">START</span>
          </div>
        </div>

        <div class="gb-speaker"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      </div>

      <div class="rom-name-tag">현재 실행 중: <b id="rom-name-label">-</b></div>

      <div class="action-row">
        <button class="util-btn" id="btn-pause">⏸ 일시정지</button>
        <button class="util-btn" id="btn-reset">🔄 다시하기</button>
        <button class="util-btn" id="btn-change-rom">📁 롬 변경</button>
        <button class="util-btn danger" id="btn-exit2">🚪 나가기</button>
      </div>

      <div class="kbd-hint">
        PC 키보드: 방향키 = 이동 · X/J = A · Z/Q = B · Shift = Select · Enter = Start
      </div>
    </div>
  </div>
</div>

<!-- ===== GameBoy Online 에뮬레이터 코어 ===== -->
<script>
  // GameBoy-Online 코어가 필요로 하는 최소한의 전역 함수들 (터미널/윈도우 UI 없이 동작하도록 자체 구현)
  var DEBUG_MESSAGES = false;
  var DEBUG_WINDOWING = false;
  function cout(message, colorIndex) {
    if (colorIndex === 2) { console.warn("[GameBoy]", message); }
    else { console.log("[GameBoy]", message); }
  }
  function findValue(key) {
    try {
      var v = window.localStorage.getItem(key);
      return (v != null) ? JSON.parse(v) : null;
    } catch (e) { return null; }
  }
  function setValue(key, value) {
    try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { cout("localStorage 저장 실패: " + e.message, 2); }
  }
  function deleteValue(key) {
    try { window.localStorage.removeItem(key); } catch (e) {}
  }
</script>
<script src="assets/gameboy/GameBoyCore.js"></script>
<script src="assets/gameboy/GameBoyIO.js"></script>
<script src="assets/gameboy/resampler.js"></script>
<script src="assets/gameboy/XAudioServer.js"></script>
<script src="assets/gameboy/resize.js"></script>

<script>
(function () {
  var pickerView = document.getElementById('picker-view');
  var playerView = document.getElementById('player-view');
  var romInput = document.getElementById('rom-input');
  var canvas = document.getElementById('gbCanvas');
  var romNameLabel = document.getElementById('rom-name-label');
  var batteryDot = document.getElementById('battery-dot');
  var isPaused = false;
  var currentRomData = null;

  function showPlayer(name) {
    pickerView.style.display = 'none';
    playerView.style.display = 'flex';
    romNameLabel.textContent = name;
    batteryDot.classList.add('on');
    isPaused = false;
    document.getElementById('btn-pause').textContent = '⏸ 일시정지';
  }

  function showPicker() {
    playerView.style.display = 'none';
    pickerView.style.display = 'flex';
    batteryDot.classList.remove('on');
  }

  function loadRomFile(file) {
    if (!file) return;
    var name = file.name || 'ROM';
    var lowerName = name.toLowerCase();
    if (!/\.(gb|gbc)$/.test(lowerName)) {
      var ok = confirm('"' + name + '" 파일은 .gb 또는 .gbc 확장자가 아니에요.\n그래도 게임보이 롬으로 불러올까요?');
      if (!ok) return;
    }
    var reader = new FileReader();
    reader.onload = function () {
      currentRomData = this.result;
      try {
        // 캔버스가 화면에 보여야(display:none이 아니어야) 올바른 크기로 초기화되므로
        // 반드시 화면 전환을 먼저 하고, 그 다음 에뮬레이터를 시작한다.
        showPlayer(name);
        canvas.width = 160;
        canvas.height = 144;
        start(canvas, currentRomData); // GameBoyIO.js 의 start()
      } catch (err) {
        alert('롬 파일을 불러오는 중 문제가 발생했어요: ' + err.message);
      }
    };
    reader.onerror = function () {
      alert('파일을 읽는 중 오류가 발생했어요.');
    };
    reader.readAsBinaryString(file);
  }

  document.getElementById('btn-attach').addEventListener('click', function () { romInput.click(); });
  document.getElementById('btn-change-rom').addEventListener('click', function () {
    try { clearLastEmulation(); } catch (e) {}
    romInput.click();
  });
  romInput.addEventListener('change', function () {
    if (this.files && this.files.length > 0) {
      loadRomFile(this.files[this.files.length - 1]);
    }
    this.value = '';
  });

  document.getElementById('btn-pause').addEventListener('click', function () {
    try {
      if (isPaused) { run(); isPaused = false; this.textContent = '⏸ 일시정지'; }
      else { pause(); isPaused = true; this.textContent = '▶ 재개'; }
    } catch (e) {}
  });

  document.getElementById('btn-reset').addEventListener('click', function () {
    if (currentRomData) {
      try { start(canvas, currentRomData); isPaused = false; document.getElementById('btn-pause').textContent = '⏸ 일시정지'; }
      catch (e) { alert('다시 시작하는 중 문제가 발생했어요.'); }
    }
  });

  function exitEmulator() {
    try { clearLastEmulation(); } catch (e) {}
    window.location.href = 'index.html';
  }
  document.getElementById('btn-exit').addEventListener('click', exitEmulator);
  document.getElementById('btn-exit2').addEventListener('click', exitEmulator);

  // ---- 터치/마우스 조작 (D-pad, A/B, Select/Start) ----
  // iOS Safari는 사용자 제스처(탭) 안에서만 오디오 재생을 허용해요.
  // 롬 로딩은 비동기라 오디오 컨텍스트가 'suspended' 상태로 생성되므로,
  // 사용자가 조작 버튼을 처음 누르는 순간(진짜 제스처)에 강제로 resume 시켜줍니다.
  function unlockAudio() {
    try {
      var ctx = window.XAudioJSWebAudioContextHandle;
      if (ctx && ctx.state === 'suspended') { ctx.resume(); }
    } catch (e) {}
  }

  var pressed = {};
  function keyDown(key) {
    unlockAudio();
    if (pressed[key]) return;
    pressed[key] = true;
    try { GameBoyKeyDown(key); } catch (e) {}
  }
  function keyUp(key) {
    pressed[key] = false;
    try { GameBoyKeyUp(key); } catch (e) {}
  }
  document.querySelectorAll('[data-key]').forEach(function (el) {
    var key = el.getAttribute('data-key');
    el.addEventListener('touchstart', function (e) { e.preventDefault(); keyDown(key); }, { passive: false });
    el.addEventListener('touchend', function (e) { e.preventDefault(); keyUp(key); }, { passive: false });
    el.addEventListener('touchcancel', function (e) { keyUp(key); });
    el.addEventListener('mousedown', function (e) { e.preventDefault(); keyDown(key); });
    el.addEventListener('mouseup', function () { keyUp(key); });
    el.addEventListener('mouseleave', function () { keyUp(key); });
  });

  // ---- 키보드 조작 ----
  var keyZones = [
    ['right', [39]], ['left', [37]], ['up', [38]], ['down', [40]],
    ['a', [88, 74]], ['b', [90, 81, 89]], ['select', [16]], ['start', [13]]
  ];
  document.addEventListener('keydown', function (event) {
    keyZones.forEach(function (zone) {
      if (zone[1].indexOf(event.keyCode) !== -1) { keyDown(zone[0]); event.preventDefault(); }
    });
  });
  document.addEventListener('keyup', function (event) {
    keyZones.forEach(function (zone) {
      if (zone[1].indexOf(event.keyCode) !== -1) { keyUp(zone[0]); event.preventDefault(); }
    });
  });

  document.addEventListener('touchstart', unlockAudio, { passive: true });
  document.addEventListener('click', unlockAudio);

  window.addEventListener('beforeunload', function () {
    try { clearLastEmulation(); } catch (e) {}
  });
})();
</script>
</body>
</html>
